services:
  postgres:
    image: postgres:17-alpine
    container_name: viralcutai-postgres
    environment:
      POSTGRES_USER: viralcutai
      POSTGRES_PASSWORD: viralcutai
      POSTGRES_DB: viralcutai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralcutai -d viralcutai"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  postgres_data:
